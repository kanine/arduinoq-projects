<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Sensor</title>
    <link rel="icon" type="image/png" href="./img/favicon.png">
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div class="header">
        <h1 class="title">SONIC SENSOR</h1>
        <img class="arduino-logo" src="./img/arduino-clogo.svg" alt="Arduino Logo">
    </div>

    <div class="container">
        <div class="reading-panel" id="reading-panel">
            <div class="scanline"></div>
            <div class="panel-label">Distance</div>
            <div class="distance" id="distance">----</div>
            <div class="unit">mm</div>
        </div>

        <div class="status-line" id="status-label">STATUS: READY</div>

        <div class="badges">
            <div class="badge" id="badge-range">NO READING</div>
            <div class="badge" id="badge-alert">COOLDOWN IDLE</div>
            <div class="badge" id="badge-steady">STEADY: -- MM</div>
        </div>

        <div class="timer-panel" id="timer-panel">
            <div class="timer-head">
                <span>Cooldown Timer</span>
                <span id="cooldown-remaining">0.00s</span>
            </div>
            <div class="timer-track">
                <div class="timer-fill" id="timer-fill"></div>
            </div>
        </div>

        <div class="config-panel">
            <div class="config-row">
                <label for="timeout-input">Sensor Timeout</label>
                <div class="config-input-wrap">
                    <input id="timeout-input" type="number" min="0.2" max="60" step="0.1" value="3.0">
                    <span class="suffix">s</span>
                </div>
            </div>
            <div class="config-row">
                <label for="threshold-input">Out of Range Threshold</label>
                <div class="config-input-wrap">
                    <input id="threshold-input" type="number" min="100" max="250" step="1" value="220">
                    <span class="suffix">mm</span>
                </div>
            </div>
            <button id="steady-state-btn" class="steady-btn" type="button">
                SET STEADY STATE TO: -- MM
            </button>
        </div>

        <div class="chart-panel">
            <div class="chart-label">Recent readings</div>
            <canvas id="sparkline"></canvas>
        </div>

        <div class="conn-row">
            <div class="conn-dot" id="conn-dot"></div>
            <span id="conn-label">connecting…</span>
        </div>

        <div id="error-container" class="error-message" style="display: none;"></div>
    </div>

    <footer class="footer">
        <span class="footer-label">HOST FILE</span>
        <span id="host-file-location">--</span>
    </footer>

    <script src="libs/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
